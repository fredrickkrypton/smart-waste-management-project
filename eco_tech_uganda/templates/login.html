<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eco-Tech Uganda</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Eco-Tech Login</h2>
        <input type="email" id="email" placeholder="Email (e.g. admin@ecotech.ug)" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="handleLogin()">Sign In</button>
        <p id="message" style="color: red; font-size: 12px;"></p>
    </div>

    <script>
        // 1. YOUR FIREBASE CONFIG (Get this from Firebase Console > Project Settings)
        const firebaseConfig = {
            apiKey: "AIzaSyBq5hzOfU0phdLThW-04vYZ7Cx7Sfp8COA",
            authDomain: "smart-waste-management-project.firebaseapp.com",
            projectId: "smart-waste-management-project",
            storageBucket: "smart-waste-management-project.firebasestorage.app",
            messagingSenderId: "309823595593",
            appId: "1:309823595593:web:e034dfea3c30f1b9470b98",
            measurementId: "G-299WLEH7XQ"
        };
        firebase.initializeApp(firebaseConfig);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            try {
                // 2. Sign in with Firebase
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const idToken = await userCredential.user.getIdToken();

                // 3. Send the ID Token to your Flask backend
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: idToken })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    window.location.href = '/'; // Redirect to dashboard
                } else {
                    msg.innerText = "Access Denied: " + result.message;
                }
            } catch (error) {
                msg.innerText = error.message;
            }
        }
    </script>
</body>
</html>
